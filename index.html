<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dein Angebot in 60 Minuten System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #E91E63;
    --pink-dark: #C2185B;
    --pink-light: #FCE4EC;
    --black: #111111;
    --white: #FFFFFF;
    --gray: #F5F5F5;
    --gray-mid: #E0E0E0;
    --text-muted: #757575;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
    max-width: 560px;
    width: 100%;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 0.04em;
    color: var(--black);
    line-height: 1.0;
  }

  h1 span { color: var(--pink); }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 8px;
    font-weight: 300;
    line-height: 1.5;
  }

  .container {
    width: 100%;
    max-width: 560px;
    background: var(--white);
    border-radius: 0;
    border: 2px solid var(--black);
    display: flex;
    flex-direction: column;
    height: 620px;
    box-shadow: 6px 6px 0px var(--black);
  }

  /* Progress */
  .progress {
    background: var(--black);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .step {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.35);
    transition: all 0.3s;
    font-family: 'DM Sans', sans-serif;
  }
  .step.active {
    background: var(--pink);
    color: var(--white);
    border-color: var(--pink);
    font-weight: 700;
  }
  .step.done {
    background: rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    border-color: rgba(255,255,255,0.3);
  }

  .step-connector {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.15);
  }

  .module-label {
    font-size: 11px;
    color: var(--white);
    padding: 7px 20px 9px;
    background: var(--pink);
    letter-spacing: 0.06em;
    font-weight: 500;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Chat */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--white);
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--gray-mid); border-radius: 2px; }

  .msg-row { display: flex; gap: 10px; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 0;
    background: var(--black);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500;
    color: var(--white);
    flex-shrink: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .avatar.user-av {
    background: var(--pink-light);
    color: var(--pink-dark);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.65;
  }
  .msg-row.bot .bubble {
    background: var(--gray);
    color: var(--black);
    border-radius: 0 12px 12px 12px;
    border: 1px solid var(--gray-mid);
  }
  .msg-row.user .bubble {
    background: var(--black);
    color: var(--white);
    border-radius: 12px 0 12px 12px;
  }

  .typing-bubble { display: flex; gap: 5px; padding: 16px; }
  .typing-bubble span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--pink);
    animation: pulse 1.2s infinite;
  }
  .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* Quick replies */
  .quick-replies {
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    border-top: 1px solid var(--gray-mid);
    background: var(--white);
    flex-shrink: 0;
  }

  .qr {
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    background: var(--white);
    border: 1.5px solid var(--gray-mid);
    border-radius: 20px;
    color: var(--black);
    transition: all 0.15s;
    font-weight: 400;
  }
  .qr:hover { border-color: var(--black); background: var(--gray); }
  .qr.next-btn {
    background: var(--pink);
    color: var(--white);
    border-color: var(--pink);
    font-weight: 500;
  }
  .qr.next-btn:hover { background: var(--pink-dark); border-color: var(--pink-dark); }

  /* Input */
  .input-area {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--gray-mid);
    background: var(--white);
    flex-shrink: 0;
  }

  #user-input {
    flex: 1;
    padding: 10px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    border: 1.5px solid var(--gray-mid);
    border-radius: 0;
    background: var(--white);
    color: var(--black);
    outline: none;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--pink); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 44px; height: 44px;
    background: var(--pink);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
    border-radius: 0;
  }
  #send-btn:hover { background: var(--pink-dark); }
  #send-btn:disabled { background: var(--gray-mid); cursor: default; }
  #send-btn svg { fill: white; }

  /* Error */
  .error-bubble {
    background: #FFF3F5;
    border: 1px solid #FFCDD2;
    color: #C62828;
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 8px;
    margin: 8px 0;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Ausgebucht als VA</p>
  <h1>DEIN ANGEBOT IN<br><span>60 MINUTEN</span> SYSTEM</h1>
  <p class="subtitle">Vom „Ich weiß nicht, was ich anbieten soll" zum buchbaren Angebot.</p>
</header>

<div class="container">
  <div class="progress" id="progress-bar">
    <div class="step active" id="dot-0">1</div>
    <div class="step-connector"></div>
    <div class="step" id="dot-1">2</div>
    <div class="step-connector"></div>
    <div class="step" id="dot-2">3</div>
    <div class="step-connector"></div>
    <div class="step" id="dot-3">4</div>
    <div class="step-connector"></div>
    <div class="step" id="dot-4">B</div>
  </div>
  <div class="module-label" id="module-label">Modul 1 · Skill-Inventar · 10 Minuten</div>
  <div class="chat" id="chat-area"></div>
  <div class="quick-replies" id="quick-replies" style="display:none;"></div>
  <div class="input-area">
    <input type="text" id="user-input" placeholder="Schreib hier deine Antwort..." />
    <button id="send-btn" onclick="handleSend()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
let currentModule = 0;
let history = [];
let loading = false;

const MODULE_LABELS = [
  'Modul 1 · Skill-Inventar · 10 Minuten',
  'Modul 2 · Markt-Check · 10 Minuten',
  'Modul 3 · Match-Moment · 15 Minuten',
  'Modul 4 · Angebot auf den Punkt · 15 Minuten',
  'Bonus · Dein erster Schritt · 10 Minuten'
];

const NEXT_LABELS = [
  '→ Weiter zu Modul 2',
  '→ Weiter zu Modul 3',
  '→ Weiter zu Modul 4',
  '→ Weiter zum Bonus',
  ''
];

const SYSTEM_PROMPTS = [
  `Du bist eine warmherzige, direkte KI-Sparringspartnerin im Kurs "Dein Angebot in 60 Minuten" von Ausgebucht als VA. Gerade läuft MODUL 1: Skill-Inventar (10 Minuten).

Deine Aufgabe: Hilf der Nutzerin, ihre echten Skills zu sehen. Keine Motivationssprüche, keine langen Listen. Kurze, konkrete Fragen. Sei wie eine gute Freundin, die ehrlich nachfragt.

Stelle immer nur EINE Frage gleichzeitig. Fang an: Was hat sie in ihrem Berufsleben anderen Menschen zuletzt wirklich abgenommen oder erleichtert?

Nach 3-4 Nachrichten: Fass die Skills als kurze Liste zusammen. Dann sag ihr, sie soll auf "Weiter zu Modul 2" klicken. Maximal 3 Sätze pro Antwort. Kein Marketing-Sprech.`,

  `Du bist eine direkte KI-Sparringspartnerin im Kurs "Dein Angebot in 60 Minuten" von Ausgebucht als VA. Gerade läuft MODUL 2: Markt-Check (10 Minuten).

Erkläre kurz (2-3 Sätze) welche VA-Skills aktuell gefragt sind: Social Media Management, E-Mail & Kalender, Content Creation, Launch-Support, Kundenservice, Buchhaltungsvorbereitung, Tech/Tools-Support.

Frag dann: Welche davon klingen nach "das könnte ich"? Nur EINE Frage. Nach 2-3 Nachrichten Zusammenfassung + sag ihr, auf "Weiter zu Modul 3" zu klicken. Kein Filler. Direkt.`,

  `Du bist eine KI-Sparringspartnerin im Kurs "Dein Angebot in 60 Minuten" von Ausgebucht als VA. Gerade läuft MODUL 3: Match-Moment (15 Minuten) – der wichtigste Teil.

Ziel: Die goldene Schnittmenge finden: Was kann sie? Was mag sie? Was ist gefragt?

Stell genau diese Frage: "Was von dem, was du kannst und was gefragt ist, würdest du auch den ganzen Tag machen – ohne dass es sich nach Arbeit anfühlt?" Eine Frage. Hör zu. Hilf ihr, DEN einen Match klar zu benennen. Nach dem Match: kurze Bestätigung + "Weiter zu Modul 4".`,

  `Du bist eine KI-Sparringspartnerin im Kurs "Dein Angebot in 60 Minuten" von Ausgebucht als VA. Gerade läuft MODUL 4: Angebot auf den Punkt (15 Minuten).

Vorlage: "[Dienstleistung] – Ich helfe [Zielgruppe] dabei, [konkretes Ergebnis] zu erreichen. Preis: [X] €"

Geh Schritt für Schritt vor – eine Frage nach der anderen:
1. Was ist die konkrete Dienstleistung?
2. Für wen genau?
3. Was ist das messbare Ergebnis?
4. Preis? (Orientierung: 300-800€/Monat Retainer oder 150-400€ Paket)

Formuliere am Ende ihr fertiges Angebot als klaren Text in Anführungszeichen. Dann sag: auf "Weiter zum Bonus" klicken.`,

  `Du bist eine KI-Sparringspartnerin im Kurs "Dein Angebot in 60 Minuten" von Ausgebucht als VA. Gerade läuft der BONUS: Erster Schritt in den nächsten 24 Stunden.

Gib einen konkreten Aktionsplan. Optionen: 1) 2-3 Facebook-Gruppen für Unternehmer/innen, 2) 3 Menschen aus dem Netzwerk direkt anschreiben, 3) Instagram Story.

Frag welche Option sich am machbarsten anfühlt. Gib ihr dann einen kurzen Text, den sie direkt copy-pasten kann. Verabschiede sie warm und direkt – sie hat heute etwas geschafft, das die meisten nie tun. Kein Marketing-Sprech.`
];

function updateProgress() {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById('dot-' + i);
    dot.className = 'step' + (i < currentModule ? ' done' : i === currentModule ? ' active' : '');
  }
  document.getElementById('module-label').textContent = MODULE_LABELS[currentModule];
}

function addMsg(role, text) {
  const chat = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = role === 'bot' ? 'avatar' : 'avatar user-av';
  av.textContent = role === 'bot' ? 'KI' : 'Du';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  row.appendChild(av);
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat-area');
  const row = document.createElement('div');
  row.className = 'msg-row bot'; row.id = 'typing';
  row.innerHTML = '<div class="avatar">KI</div><div class="bubble"><div class="typing-bubble"><span></span><span></span><span></span></div></div>';
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function setQuickReplies(options, isNext) {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  qr.style.display = options.length ? 'flex' : 'none';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = isNext ? 'qr next-btn' : 'qr';
    btn.textContent = opt;
    btn.onclick = () => opt.startsWith('→') ? nextModule() : handleInput(opt);
    qr.appendChild(btn);
  });
}

async function callAPI(msg) {
  history.push({ role: 'user', content: msg });
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system: SYSTEM_PROMPTS[currentModule], messages: history })
  });
  if (!res.ok) throw new Error('API Fehler ' + res.status);
  const data = await res.json();
  const reply = data.reply || '';
  history.push({ role: 'assistant', content: reply });
  return reply;
}

async function handleInput(text) {
  if (loading || !text.trim()) return;
  loading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('user-input').value = '';
  setQuickReplies([]);

  addMsg('user', text);
  showTyping();

  try {
    const reply = await callAPI(text);
    removeTyping();
    addMsg('bot', reply);
    const lower = reply.toLowerCase();
    const hasNext = lower.includes('weiter zu modul') || lower.includes('weiter zum bonus');
    if (hasNext && currentModule < 4) {
      setQuickReplies([NEXT_LABELS[currentModule]], true);
    }
  } catch(e) {
    removeTyping();
    const chat = document.getElementById('chat-area');
    const err = document.createElement('div');
    err.className = 'error-bubble';
    err.textContent = 'Verbindungsfehler – bitte Seite neu laden.';
    chat.appendChild(err);
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
}

function nextModule() {
  if (currentModule >= 4) return;
  currentModule++;
  history = [];
  updateProgress();
  startModule();
}

async function startModule() {
  loading = true;
  document.getElementById('send-btn').disabled = true;
  setQuickReplies([]);
  showTyping();

  try {
    const reply = await callAPI('Starte das Modul jetzt. Nenn kurz den Modulnamen und stell sofort deine erste Frage. Maximal 3 Sätze.');
    removeTyping();
    addMsg('bot', reply);
  } catch(e) {
    removeTyping();
    addMsg('bot', 'Fehler beim Laden. Bitte Seite neu laden.');
  }

  loading = false;
  document.getElementById('send-btn').disabled = false;
}

function handleSend() {
  handleInput(document.getElementById('user-input').value.trim());
}

document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

updateProgress();
startModule();
</script>
</body>
</html>
